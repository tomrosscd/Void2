kind = "web"
previewPath = "/"
title = "Void"
version = "1.0.0"
id = "artifacts/void"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18944

[services.development]
run = "pnpm --filter @workspace/void run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/void", "run", "build" ]
publicDir = "artifacts/void/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18944"
BASE_PATH = "/"
