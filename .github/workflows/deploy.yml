name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allow manual re-deploys from the Actions tab
  workflow_dispatch:

# Grant the GITHUB_TOKEN permission to write to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; don't cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm must be set up before Node so its cache key is correct
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Architectural decision: we only build the void frontend artifact.
      # The api-server, db, and other packages are backend-only and have no
      # place in a static GitHub Pages deployment.
      - name: Build void app
        working-directory: artifacts/void
        run: pnpm run build
        # base "/" is already set in vite.config.ts — no env vars needed.

      # Upload the Vite output directory as the Pages artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/void/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
